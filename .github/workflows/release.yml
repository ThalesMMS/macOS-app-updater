name: Release assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      APP_NAME: macOS-app-updater
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate script entry point
        run: |
          set -euo pipefail
          bash -n update-all.sh
          chmod +x update-all.sh
          ./update-all.sh --help >/dev/null

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/package
          chmod +x update-all.sh
          cp update-all.sh README.md LICENSE dist/package/
          tar -czf "dist/${APP_NAME}-${TAG_NAME}.tar.gz" -C dist/package update-all.sh README.md LICENSE
          (
            cd dist/package
            zip -q "../${APP_NAME}-${TAG_NAME}.zip" update-all.sh README.md LICENSE
          )
          (
            cd dist
            shasum -a 256 "${APP_NAME}-${TAG_NAME}.tar.gz" "${APP_NAME}-${TAG_NAME}.zip" > "${APP_NAME}-${TAG_NAME}-SHA256SUMS.txt"
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*SHA256SUMS.txt
