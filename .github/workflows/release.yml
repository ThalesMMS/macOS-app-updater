name: Release assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      APP_NAME: macOS-app-updater
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate script entry point
        run: |
          set -euo pipefail
          bash -n update-all.sh
          chmod +x update-all.sh
          ./update-all.sh --help >/dev/null

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar --prefix="${APP_NAME}-${TAG_NAME}/" -o "dist/${APP_NAME}-${TAG_NAME}.tar" "${TAG_NAME}"
          gzip -f "dist/${APP_NAME}-${TAG_NAME}.tar"
          git archive --format=zip --prefix="${APP_NAME}-${TAG_NAME}/" -o "dist/${APP_NAME}-${TAG_NAME}.zip" "${TAG_NAME}"
          (
            cd dist
            shasum -a 256 "${APP_NAME}-${TAG_NAME}.tar.gz" "${APP_NAME}-${TAG_NAME}.zip" > "${APP_NAME}-${TAG_NAME}-SHA256SUMS.txt"
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*SHA256SUMS.txt
